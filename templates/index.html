<script>
const HOSTED_APP = "https://interpreter.jamaicantruestories.com";

const API =
  window.location.origin.includes("localhost") ||
  window.location.origin.includes("127.0.0.1")
    ? "http://127.0.0.1:5000"
    : HOSTED_APP;

const EMAIL_KEY = "jdi_email";
const LEGACY_EMAIL_KEY = "jts_email";
const JOURNAL_KEY = "jdi_journal";
const SUPPORT_EMAIL = "tinamaccontent@gmail.com";
const REWARDED_AD_ID = "ca-app-pub-2148520143702642/6436071510";

const emailEl = document.getElementById("email");
const dreamEl = document.getElementById("dream");
const btn = document.getElementById("interpret");
const result = document.getElementById("result");
const accessStatus = document.getElementById("accessStatus");
const charCount = document.getElementById("charCount");
const qualityHint = document.getElementById("qualityHint");
const journalList = document.getElementById("journalList");
const journalSearch = document.getElementById("journalSearch");
const memberLine = document.getElementById("memberLine");
const subscriptionAccount = document.getElementById("subscriptionAccount");
const accountDreamPackForm = document.getElementById("accountDreamPackForm");
const accountDreamPackEmail = document.getElementById("accountDreamPackEmail");
const accountDreamPackReturn = document.getElementById("accountDreamPackReturn");
const accountDreamPackBtn = document.getElementById("accountDreamPackBtn");
const guidedPanel = document.getElementById("guidedPanel");
const emotionEl = document.getElementById("emotion");
const endingEl = document.getElementById("ending");
const placeEl = document.getElementById("place");
const peopleEl = document.getElementById("people");

const menuBtn = document.getElementById("menuBtn");
const menuPanel = document.getElementById("menuPanel");
const closeMenu = document.getElementById("closeMenu");

const rewardModal = document.getElementById("rewardModal");
const rewardContinue = document.getElementById("rewardContinue");
const rewardCount = document.getElementById("rewardCount");
const rewardUpgrade = document.getElementById("rewardUpgrade");
const rewardAdSpace = document.getElementById("rewardAdSpace");

let journalFilter = "all";
let selectedGuidedSymbols = [];
let rewardReady = false;
let rewardTimer = null;
let pendingRewardDecode = false;
let nativeRewardInProgress = false;
let rewardListeners = [];

const SYMBOLS = [
  { name: "Dog", icon: "🐕", meaning: "Chasing, pressure, loyalty, warning", key: "dog", category: "animal" },
  { name: "School", icon: "🏫", meaning: "Past lessons, pressure, memory", key: "school", category: "place" },
  { name: "Water", icon: "〰️", meaning: "Decision, emotions, spiritual state", key: "water", category: "nature" },
  { name: "Teeth", icon: "🦷", meaning: "Serious warning, anxiety, loss", key: "teeth", category: "body" },
  { name: "Falling", icon: "🪂", meaning: "Loss of control, fear, transition", key: "falling", category: "action" },
  { name: "Money", icon: "💰", meaning: "Opportunity, power, worry", key: "money", category: "object" },
  { name: "House", icon: "⌂", meaning: "Private life, self, family matter", key: "house", category: "place" },
  { name: "Snake", icon: "蛇", meaning: "Enemy, opposition, hidden issue", key: "snake", category: "animal" },
  { name: "Car", icon: "🚗", meaning: "Direction, control, life journey", key: "car", category: "object" },
  { name: "Hair", icon: "〰", meaning: "Burden, ongoing problem, concern", key: "hair", category: "body" },
  { name: "Road", icon: "⌁", meaning: "Path, decision, journey", key: "road", category: "place" },
  { name: "Baby", icon: "✺", meaning: "New beginning, responsibility, fragile matter", key: "baby", category: "people" }
];

function esc(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function normalizeEmail(email) {
  return String(email || "").trim().toLowerCase();
}

function validEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(normalizeEmail(email));
}

function saveEmail(email) {
  const clean = normalizeEmail(email);

  try {
    if (clean) {
      localStorage.setItem(EMAIL_KEY, clean);
      localStorage.setItem(LEGACY_EMAIL_KEY, clean);
    } else {
      localStorage.removeItem(EMAIL_KEY);
    }
  } catch (e) {}

  refreshAccount();
}

function loadEmail() {
  try {
    return normalizeEmail(
      localStorage.getItem(EMAIL_KEY) ||
      localStorage.getItem(LEGACY_EMAIL_KEY) ||
      ""
    );
  } catch (e) {
    return "";
  }
}

function getReturnUrl() {
  return window.location.href.split("#")[0];
}

function upgradeUrl(email) {
  const clean = normalizeEmail(email);
  return API + "/upgrade?email=" + encodeURIComponent(clean) + "&return=" + encodeURIComponent(getReturnUrl());
}

function readJournal() {
  try {
    const raw = localStorage.getItem(JOURNAL_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) {
    return [];
  }
}

function writeJournal(entries) {
  try {
    localStorage.setItem(JOURNAL_KEY, JSON.stringify(entries.slice(0, 200)));
  } catch (e) {}
}

function addJournalEntry(entry) {
  const entries = readJournal();
  entries.unshift(entry);
  writeJournal(entries);
  renderJournal();
  refreshAccount();
}

function showAccessStatus(html) {
  accessStatus.style.display = "block";
  accessStatus.innerHTML = html;
  refreshAds();
}

function hideAccessStatus() {
  accessStatus.style.display = "none";
  accessStatus.innerHTML = "";
  refreshAds();
}

function userHasPaidAccess() {
  const statusText = String(accessStatus?.textContent || "").toLowerCase();

  return (
    statusText.includes("subscription active") ||
    statusText.includes("dream pack active")
  );
}

function refreshAds() {
  const decodeAd = document.getElementById("decodeAd");
  if (!decodeAd) return;
  decodeAd.classList.toggle("hidden", userHasPaidAccess());
}

function shouldShowRewardAd() {
  return !userHasPaidAccess();
}

function setRewardSpace(message) {
  if (!rewardAdSpace) return;
  rewardAdSpace.innerHTML = esc(message);
}

function openRewardModal() {
  rewardReady = false;
  pendingRewardDecode = true;

  if (rewardTimer) {
    clearInterval(rewardTimer);
    rewardTimer = null;
  }

  rewardContinue.disabled = true;
  rewardContinue.textContent = "Continue Decode";
  rewardCount.textContent = "Loading sponsored message...";
  rewardUpgrade.href = upgradeUrl(emailEl.value);
  setRewardSpace("Rewarded video will open now.");

  rewardModal.classList.add("show");
  rewardModal.setAttribute("aria-hidden", "false");
}

function closeRewardModal() {
  rewardModal.classList.remove("show");
  rewardModal.setAttribute("aria-hidden", "true");

  if (rewardTimer) {
    clearInterval(rewardTimer);
    rewardTimer = null;
  }
}

async function clearRewardListeners() {
  const oldListeners = rewardListeners.slice();
  rewardListeners = [];
  await Promise.all(
    oldListeners.map(async (listener) => {
      try {
        await listener.remove();
      } catch (e) {}
    })
  );
}

async function showNativeRewardedAd() {
  if (nativeRewardInProgress) return false;

  const admob = window.Capacitor?.Plugins?.AdMob;
  if (!admob) {
    rewardCount.textContent = "Ad system not available in browser preview.";
    setRewardSpace("Open this page inside the Android app to test rewarded ads.");
    return false;
  }

  nativeRewardInProgress = true;
  rewardReady = false;

  await clearRewardListeners();

  return new Promise(async (resolve) => {
    let earned = false;
    let finished = false;

    try {
      const rewardListener = await admob.addListener("onRewardedVideoAdReward", () => {
        earned = true;
        rewardReady = true;
        rewardCount.textContent = "Reward earned.";
      });

      const dismissListener = await admob.addListener("onRewardedVideoAdDismissed", async () => {
        if (finished) return;
        finished = true;
        nativeRewardInProgress = false;
        await clearRewardListeners();
        resolve(earned);
      });

      rewardListeners.push(rewardListener, dismissListener);

      rewardCount.textContent = "Loading sponsored message...";
      setRewardSpace("Preparing rewarded ad...");

      await admob.prepareRewardVideoAd({
        adId: REWARDED_AD_ID,
        isTesting: false
      });

      rewardCount.textContent = "Sponsored message playing...";
      setRewardSpace("Rewarded ad is playing full screen.");
      await admob.showRewardVideoAd();
    } catch (error) {
      nativeRewardInProgress = false;
      await clearRewardListeners();
      console.warn("Rewarded ad failed:", error);
      rewardCount.textContent = "Ad could not load right now.";
      setRewardSpace("Please try again in a moment.");
      resolve(false);
    }
  });
}

function switchTab(tab) {
  document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
  document.getElementById(tab + "Screen").classList.add("active");

  document.querySelectorAll(".bottom-nav button").forEach((b) => {
    b.classList.toggle("active", b.dataset.tab === tab);
  });

  menuPanel.classList.remove("open");

  if (tab === "journal") renderJournal();
  if (tab === "symbols") renderSymbols();
  if (tab === "account") refreshAccount();

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateCharCount() {
  const len = dreamEl.value.length;
  charCount.textContent = len + "/2000";

  const dream = dreamEl.value.toLowerCase();
  const hasEmotion =
    emotionEl.value ||
    dream.includes("felt") ||
    dream.includes("afraid") ||
    dream.includes("happy") ||
    dream.includes("sad");
  const hasEnding =
    endingEl.value ||
    dream.includes("ended") ||
    dream.includes("woke") ||
    dream.includes("escaped");

  if (len < 20) {
    qualityHint.textContent = "Tip: add more dream detail.";
  } else if (!hasEmotion) {
    qualityHint.textContent = "Tip: add how you felt.";
  } else if (!hasEnding) {
    qualityHint.textContent = "Tip: add how it ended.";
  } else {
    qualityHint.textContent = "Good detail for interpretation.";
  }
}

function appendDreamText(text) {
  const clean = String(text || "").trim();

  dreamEl.value = dreamEl.value.trim()
    ? dreamEl.value.trim() + "\n" + clean
    : clean;

  updateCharCount();
}

function formatDate(iso) {
  try {
    return new Date(iso).toLocaleString([], {
      month: "short",
      day: "numeric",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    });
  } catch (e) {
    return "";
  }
}

function shortText(text, max) {
  const clean = String(text || "").replace(/\s+/g, " ").trim();
  return clean.length > max ? clean.slice(0, max - 3) + "..." : clean;
}

function buildDreamPayload() {
  const parts = [];

  const dream = dreamEl.value.trim();
  if (dream) parts.push("Dream:\n" + dream);

  if (emotionEl.value) parts.push("Emotion:\n" + emotionEl.value);
  if (endingEl.value) parts.push("Ending:\n" + endingEl.value);
  if (placeEl.value.trim()) parts.push("Place:\n" + placeEl.value.trim());
  if (peopleEl.value.trim()) parts.push("People:\n" + peopleEl.value.trim());
  if (selectedGuidedSymbols.length) parts.push("Symbols:\n" + selectedGuidedSymbols.join(", "));

  return parts.join("\n\n").trim();
}

function extractSymbols(data, dreamText) {
  const facts = data.doctrine_facts || {};
  const fromApi = Array.isArray(facts.top_symbols) ? facts.top_symbols : [];

  const detected = SYMBOLS
    .filter((s) => dreamText.toLowerCase().includes(s.key))
    .map((s) => s.name);

  return [...new Set([...fromApi, ...selectedGuidedSymbols, ...detected])].slice(0, 6);
}

function buildPatternSummary(symbols, emotion) {
  const entries = readJournal();
  const counts = {};
  const emotionCounts = {};

  entries.forEach((entry) => {
    (entry.matchedSymbols || []).forEach((sym) => {
      const key = String(sym || "").toLowerCase();
      counts[key] = (counts[key] || 0) + 1;
    });

    if (entry.metadata?.emotion) {
      const e = String(entry.metadata.emotion).toLowerCase();
      emotionCounts[e] = (emotionCounts[e] || 0) + 1;
    }
  });

  const repeated = symbols
    .map((sym) => {
      const key = String(sym || "").toLowerCase();
      return { name: sym, count: counts[key] || 0 };
    })
    .filter((x) => x.count > 0)
    .sort((a, b) => b.count - a.count);

  if (repeated.length) {
    return `Pattern noticed: ${repeated[0].name} has appeared ${repeated[0].count + 1} time(s), including this dream. Watch whether this symbol keeps returning with the same emotion or ending.`;
  }

  if (emotion && emotionCounts[String(emotion).toLowerCase()]) {
    return `Pattern noticed: the emotion "${emotion}" has appeared before in your journal. Compare this dream with earlier dreams that carried the same feeling.`;
  }

  if (entries.length >= 3) {
    return "No repeated symbol stands out yet, but your journal is growing enough to begin tracking dream patterns over time.";
  }

  return "Pattern tracking will become stronger after you save more dreams.";
}

function mapInterpretation(data, dreamText) {
  const interp = data.interpretation || {};
  const readable = data.narration?.readable_summary || data.full_interpretation || "";
  const matchedSymbols = extractSymbols(data, dreamText);
  const patternSummary = buildPatternSummary(matchedSymbols, emotionEl.value);

  return {
    mainMeaning: readable || "Your dream has been interpreted.",
    spiritualWarning: interp.spiritual_meaning || "No specific spiritual warning was returned.",
    physicalEffects: interp.effects_in_physical_realm || "No specific physical effects were returned.",
    whatToDo: interp.what_to_do || "Reflect, pray, and pay attention to repeated symbols.",
    matchedSymbols,
    patternSummary
  };
}

function iconSvg(type) {
  const icons = {
    main: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><path d="M12 5v14"/><path d="M5 12h14"/></svg>`,
    warning: `<svg viewBox="0 0 24 24"><path d="M12 3l8 4v5c0 5-3.3 8-8 9-4.7-1-8-4-8-9V7l8-4z"/><path d="M12 8v5"/><path d="M12 16h.01"/></svg>`,
    body: `<svg viewBox="0 0 24 24"><path d="M3 12h4l2-6 4 12 2-6h6"/></svg>`,
    action: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12l2.5 2.5L16 9"/></svg>`,
    pattern: `<svg viewBox="0 0 24 24"><path d="M4 18c4-10 8 0 12-10"/><path d="M16 8h4v4"/><path d="M4 6h.01"/><path d="M8 6h.01"/><path d="M12 6h.01"/></svg>`
  };

  return icons[type] || icons.main;
}

function resultCard(label, text, icon) {
  return `
    <div class="result-card">
      <div class="result-card-row">
        <div class="result-icon">${iconSvg(icon)}</div>
        <div>
          <div class="label">${esc(label)}</div>
          <div class="result-text">${esc(text)}</div>
        </div>
      </div>
    </div>
  `;
}

function renderResultCards(mapped, dreamText, entryId) {
  const now = new Date().toISOString();

  result.classList.add("show");
  result.innerHTML = `
    <div class="card decode-card">
      <div class="result-head">
        <div>
          <h3>Dream Interpretation</h3>
          <p>${esc(formatDate(now))}</p>
        </div>

        <div class="result-actions">
          <button class="small-btn" type="button" id="editDreamBtn">Edit</button>
          ${entryId ? `<button class="small-btn" type="button" id="favResultBtn">★</button>` : ""}
        </div>
      </div>

      <div class="result-text">${esc(shortText(dreamText, 150))}</div>

      ${resultCard("Main Meaning", mapped.mainMeaning, "main")}
      ${resultCard("Spiritual Warning", mapped.spiritualWarning, "warning")}
      ${resultCard("Physical Effects", mapped.physicalEffects, "body")}
      ${resultCard("What To Do", mapped.whatToDo, "action")}
      ${resultCard("Dream Pattern", mapped.patternSummary, "pattern")}

      <div class="result-card">
        <div class="label">Matched Symbols</div>
        <div class="symbol-matches">
          ${
            mapped.matchedSymbols.length
              ? mapped.matchedSymbols.map((name) => {
                  const found = SYMBOLS.find((s) => s.name.toLowerCase() === String(name).toLowerCase());
                  return `
                    <div class="match-pill">
                      <strong>${esc(name)}</strong>
                      <span>${esc(found?.meaning || "Symbol found in your dream.")}</span>
                    </div>
                  `;
                }).join("")
              : `<div class="result-text">No main symbols detected.</div>`
          }
        </div>
      </div>
    </div>
  `;

  document.getElementById("editDreamBtn").onclick = () => dreamEl.focus();

  const favBtn = document.getElementById("favResultBtn");
  if (favBtn && entryId) {
    favBtn.onclick = () => toggleFavorite(entryId, true);
  }

  result.scrollIntoView({ behavior: "smooth", block: "start" });
}

function renderError(title, message, upgrade) {
  result.classList.add("show");
  result.innerHTML = `
    <div class="result-card error">
      <div class="label">${esc(title)}</div>
      <div class="result-text">${esc(message)}</div>
      ${upgrade ? `<a class="upgrade-link" href="${esc(upgradeUrl(emailEl.value))}">View Access Options</a>` : ""}
    </div>
  `;

  result.scrollIntoView({ behavior: "smooth", block: "start" });
}

async function readResponse(res) {
  const ct = (res.headers.get("content-type") || "").toLowerCase();

  if (ct.includes("application/json")) {
    try {
      return await res.json();
    } catch (e) {
      return {};
    }
  }

  try {
    return { error: await res.text() };
  } catch (e) {
    return {};
  }
}

function renderJournal() {
  const q = String(journalSearch.value || "").toLowerCase().trim();
  const now = new Date();
  const month = now.getMonth();
  const year = now.getFullYear();

  let entries = readJournal();

  if (journalFilter === "favorites") {
    entries = entries.filter((e) => e.favorite);
  }

  if (journalFilter === "month") {
    entries = entries.filter((e) => {
      const d = new Date(e.createdAt);
      return d.getMonth() === month && d.getFullYear() === year;
    });
  }

  if (q) {
    entries = entries.filter((e) =>
      String(e.dreamText || "").toLowerCase().includes(q) ||
      String(e.summary || "").toLowerCase().includes(q) ||
      String((e.matchedSymbols || []).join(" ")).toLowerCase().includes(q) ||
      String(e.metadata?.emotion || "").toLowerCase().includes(q)
    );
  }

  if (!entries.length) {
    journalList.innerHTML = `<div class="card empty">No saved dreams yet. Decode a dream and it will appear here.</div>`;
    return;
  }

  journalList.innerHTML = entries.map((entry) => `
    <div class="journal-item" data-entry-id="${esc(entry.id)}">
      <div class="journal-icon">${esc((entry.matchedSymbols || [])[0] || "☾")}</div>

      <button type="button" style="all:unset;cursor:pointer;" data-open-entry="${esc(entry.id)}">
        <div class="journal-title">${esc(shortText(entry.dreamText, 72))}</div>
        <div class="journal-date">${esc(formatDate(entry.createdAt))}${entry.metadata?.emotion ? " • " + esc(entry.metadata.emotion) : ""}</div>
      </button>

      <div class="entry-actions">
        <button class="icon-mini" type="button" data-favorite-entry="${esc(entry.id)}">${entry.favorite ? "★" : "☆"}</button>
        <button class="icon-mini danger" type="button" data-delete-entry="${esc(entry.id)}">×</button>
      </div>
    </div>
  `).join("");

  document.querySelectorAll("[data-open-entry]").forEach((item) => {
    item.onclick = () => openJournalEntry(item.dataset.openEntry);
  });

  document.querySelectorAll("[data-favorite-entry]").forEach((item) => {
    item.onclick = (e) => {
      e.stopPropagation();
      toggleFavorite(item.dataset.favoriteEntry);
    };
  });

  document.querySelectorAll("[data-delete-entry]").forEach((item) => {
    item.onclick = (e) => {
      e.stopPropagation();
      deleteEntry(item.dataset.deleteEntry);
    };
  });
}

function openJournalEntry(id) {
  const entry = readJournal().find((e) => e.id === id);
  if (!entry) return;

  switchTab("decode");

  dreamEl.value = entry.dreamText || "";
  emotionEl.value = entry.metadata?.emotion || "";
  endingEl.value = entry.metadata?.ending || "";
  placeEl.value = entry.metadata?.place || "";
  peopleEl.value = entry.metadata?.people || "";
  selectedGuidedSymbols = entry.metadata?.selectedSymbols || [];

  renderGuidedSymbols();
  updateCharCount();

  renderResultCards({
    mainMeaning: entry.interpretation?.mainMeaning || entry.summary || "",
    spiritualWarning: entry.interpretation?.spiritualWarning || "",
    physicalEffects: entry.interpretation?.physicalEffects || "",
    whatToDo: entry.interpretation?.whatToDo || "",
    matchedSymbols: entry.matchedSymbols || [],
    patternSummary: entry.interpretation?.patternSummary || buildPatternSummary(entry.matchedSymbols || [], entry.metadata?.emotion)
  }, entry.dreamText || "", entry.id);
}

function toggleFavorite(id, stayOnDecode) {
  const entries = readJournal();
  const found = entries.find((e) => e.id === id);

  if (found) {
    found.favorite = !found.favorite;
    writeJournal(entries);
  }

  renderJournal();

  if (stayOnDecode && found) {
    alert(found.favorite ? "Added to favorites." : "Removed from favorites.");
  }
}

function deleteEntry(id) {
  if (!confirm("Delete this saved dream from your local journal?")) return;

  const entries = readJournal().filter((e) => e.id !== id);
  writeJournal(entries);
  renderJournal();
  refreshAccount();
}

function renderSymbols() {
  document.getElementById("symbolGrid").innerHTML = SYMBOLS.map((s) => `
    <button class="symbol-card" type="button" data-symbol="${esc(s.key)}">
      <span class="big">${esc(s.icon)}</span>
      <strong>${esc(s.name)}</strong>
      <span>${esc(s.meaning)}</span>
    </button>
  `).join("");

  document.querySelectorAll(".symbol-card").forEach((card) => {
    card.onclick = () => {
      appendDreamText(card.dataset.symbol);
      switchTab("decode");
      dreamEl.focus();
    };
  });
}

function renderGuidedSymbols() {
  document.getElementById("guidedSymbolChips").innerHTML = SYMBOLS.slice(0, 9).map((s) => `
    <button
      class="tiny-chip ${selectedGuidedSymbols.includes(s.name) ? "selected" : ""}"
      type="button"
      data-guided-symbol="${esc(s.name)}"
    >
      ${esc(s.name)}
    </button>
  `).join("");

  document.querySelectorAll("[data-guided-symbol]").forEach((btnEl) => {
    btnEl.onclick = () => {
      const symbol = btnEl.dataset.guidedSymbol;

      if (selectedGuidedSymbols.includes(symbol)) {
        selectedGuidedSymbols = selectedGuidedSymbols.filter((s) => s !== symbol);
      } else {
        selectedGuidedSymbols.push(symbol);
      }

      renderGuidedSymbols();
      updateCharCount();
    };
  });
}

function refreshAccount() {
  const email = loadEmail();
  const count = readJournal().length;
  const premiumUrl = upgradeUrl(email);

  if (emailEl.value !== email) {
    emailEl.value = email;
  }

  memberLine.textContent = email
    ? "Email saved • " + count + " dream(s)"
    : "Local journal mode • " + count + " dream(s)";

  if (subscriptionAccount) {
    subscriptionAccount.href = premiumUrl;
  }

  if (accountDreamPackEmail) {
    accountDreamPackEmail.value = email;
  }

  if (accountDreamPackReturn) {
    accountDreamPackReturn.value = getReturnUrl();
  }

  if (rewardUpgrade) {
    rewardUpgrade.href = premiumUrl;
  }
}

function exportJournal() {
  const entries = readJournal();
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "jamaican-dream-journal.json";
  document.body.appendChild(a);
  a.click();
  a.remove();

  URL.revokeObjectURL(url);
}

function importJournalFile(file) {
  if (!file) return;

  const reader = new FileReader();

  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!Array.isArray(parsed)) {
        alert("Invalid journal file.");
        return;
      }

      const existing = readJournal();
      const byId = new Map();

      [...parsed, ...existing].forEach((entry) => {
        if (entry && entry.id) {
          byId.set(entry.id, entry);
        }
      });

      writeJournal(Array.from(byId.values()));
      renderJournal();
      refreshAccount();
      alert("Journal imported.");
    } catch (e) {
      alert("Could not import this journal file.");
    }
  };

  reader.readAsText(file);
}

async function runInterpretation() {
  const dream = buildDreamPayload();
  const rawDream = dreamEl.value.trim();
  const email = normalizeEmail(emailEl.value);

  if (!rawDream) {
    alert("Enter your dream first.");
    dreamEl.focus();
    return;
  }

  if (email && !validEmail(email)) {
    switchTab("account");
    alert("Enter a valid email or clear the email field.");
    emailEl.focus();
    return;
  }

  if (email) {
    saveEmail(email);
  }

  btn.disabled = true;
  btn.innerHTML = `<span class="loader-ring"></span> Decoding Dream...`;
  result.classList.remove("show");
  result.innerHTML = "";

  try {
    const res = await fetch(API + "/interpret", {
      method: "POST",
      mode: "cors",
      credentials: "include",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({
        text: dream,
        email: email
      })
    });

    const data = await readResponse(res);

    if (res.status === 402) {
      window.location.href = upgradeUrl(email);
      return;
    }

    if (!res.ok) {
      renderError(
        "Interpreter Error",
        data.error || data.message || data.details || "Something went wrong calling the interpreter API.",
        false
      );
      return;
    }

    if (data.is_paid) {
      showAccessStatus("<strong>Access:</strong> Subscription active.");
    } else if (data.dream_pack?.active) {
      showAccessStatus("<strong>Access:</strong> Dream Pack active • " + esc(String(data.dream_pack.uses_remaining || 0)) + " use(s) remaining.");
    } else if (typeof data.free_uses_left === "number") {
      showAccessStatus("<strong>Access:</strong> Free mode • " + esc(String(data.free_uses_left)) + " free use(s) left.");
    }

    const mapped = mapInterpretation(data, dream);
    const entryId = "dream_" + Date.now();

    const entry = {
      id: entryId,
      createdAt: new Date().toISOString(),
      dreamText: rawDream,
      fullPrompt: dream,
      summary: mapped.mainMeaning,
      interpretation: mapped,
      matchedSymbols: mapped.matchedSymbols,
      favorite: false,
      metadata: {
        emotion: emotionEl.value,
        ending: endingEl.value,
        place: placeEl.value.trim(),
        people: peopleEl.value.trim(),
        selectedSymbols: selectedGuidedSymbols.slice()
      },
      source: "api",
      accessType: data.is_paid ? "subscription" : data.dream_pack?.active ? "pack" : "free"
    };

    addJournalEntry(entry);
    renderResultCards(mapped, rawDream, entryId);
  } catch (error) {
    renderError(
      "Network Error",
      "Could not reach the interpretation service. Please try again.",
      false
    );
    console.error(error);
  } finally {
    btn.disabled = false;
    btn.innerHTML = "Decode Dream";
    refreshAds();
  }
}

};
