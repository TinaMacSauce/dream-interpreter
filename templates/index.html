<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1, viewport-fit=cover"
/>

<title>Dream Interpreter</title>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
  rel="stylesheet"
/>

<style>

:root{

  --bg:#050506;
  --bg2:#0d0d12;

  --card:#111116;
  --card2:#17171d;

  --gold:#d4af37;
  --gold-soft:#f3e28a;

  --text:#f8efd9;
  --muted:rgba(248,239,217,.62);

  --line:rgba(212,175,55,.14);

  --shadow:rgba(0,0,0,.72);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  -webkit-text-size-adjust:100%;
  scroll-behavior:smooth;
}

body{

  margin:0;

  font-family:Inter,system-ui,sans-serif;

  background:
    radial-gradient(
      circle at top,
      rgba(212,175,55,.14),
      transparent 30%
    ),

    radial-gradient(
      circle at bottom right,
      rgba(115,92,255,.10),
      transparent 35%
    ),

    linear-gradient(
      180deg,
      #07070a,
      #030304
    );

  color:var(--text);

  overflow-x:hidden;

  overscroll-behavior:none;
}

.app{

  position:relative;

  max-width:430px;

  min-height:100svh;

  margin:0 auto;

  padding:
    max(18px, env(safe-area-inset-top))
    16px
    120px;
}

.app::before{

  content:"";

  position:fixed;

  inset:0;

  backdrop-filter:blur(80px);

  pointer-events:none;

  z-index:-2;
}

.app::after{

  content:"";

  position:fixed;

  width:320px;
  height:320px;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(212,175,55,.12),
      transparent 70%
    );

  bottom:-140px;
  right:-120px;

  filter:blur(60px);

  pointer-events:none;

  z-index:-1;
}

.topbar{

  display:flex;

  align-items:center;

  justify-content:space-between;

  gap:12px;

  margin-bottom:34px;
}

.brand{

  flex:1;

  text-align:center;
}

.brand h1{

  margin:0;

  font-size:1.24rem;

  font-weight:800;

  letter-spacing:-.05em;

  color:#fff8e7;
}

.brand p{

  margin:5px 0 0;

  font-size:.78rem;

  color:var(--muted);
}

.icon-btn{

  width:48px;
  height:48px;

  border-radius:50%;

  border:1px solid var(--line);

  background:rgba(255,255,255,.03);

  color:var(--gold-soft);

  display:flex;

  align-items:center;

  justify-content:center;

  backdrop-filter:blur(18px);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04);

  transition:
    transform .12s ease,
    opacity .2s ease,
    background .2s ease;
}

.icon-btn:active{
  transform:scale(.96);
}

.icon-btn svg{

  width:20px;
  height:20px;

  stroke-width:2;
}

.hero{

  position:relative;

  margin-bottom:34px;
}

.hero::before{

  content:"";

  position:absolute;

  width:260px;
  height:260px;

  border-radius:50%;

  background:rgba(212,175,55,.09);

  filter:blur(80px);

  top:-120px;
  left:-60px;

  z-index:-1;
}

.kicker{

  color:var(--gold);

  font-size:.74rem;

  font-weight:900;

  letter-spacing:.14em;

  text-transform:uppercase;
}

.hero h2{

  margin:12px 0 14px;

  font-size:3rem;

  font-weight:900;

  line-height:.92;

  letter-spacing:-.11em;

  color:#fff6df;
}

.hero p{

  margin:0;

  color:var(--muted);

  line-height:1.7;

  font-size:1.02rem;
}

.input-card{

  position:relative;

  border-radius:34px;

  padding:20px;

  border:1px solid rgba(212,175,55,.16);

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.05),
      rgba(255,255,255,.015)
    );

  box-shadow:
    0 28px 70px rgba(0,0,0,.58),
    inset 0 1px 0 rgba(255,255,255,.04);

  backdrop-filter:blur(26px);
}

label{

  display:block;

  margin:0 0 10px;

  font-size:.84rem;

  font-weight:900;

  color:var(--gold-soft);
}

input,
textarea{

  width:100%;

  border-radius:24px;

  border:1px solid rgba(212,175,55,.14);

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.05),
      rgba(255,255,255,.015)
    );

  backdrop-filter:blur(10px);

  color:#fff;

  outline:none;

  font-family:inherit;

  transition:
    border-color .2s ease,
    transform .15s ease,
    background .2s ease;
}

input:focus,
textarea:focus{

  border-color:rgba(243,226,138,.45);

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.06),
      rgba(255,255,255,.02)
    );

  transform:translateY(-1px);
}

input{

  padding:16px;

  margin-bottom:18px;

  font-size:1rem;
}

textarea{

  min-height:260px;

  resize:vertical;

  padding:20px;

  line-height:1.72;

  font-size:1rem;
}

textarea::placeholder,
input::placeholder{

  color:rgba(248,239,217,.28);
}

.chips{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:10px;

  margin-top:16px;
}

.chip{

  border-radius:18px;

  border:1px solid rgba(212,175,55,.12);

  background:rgba(255,255,255,.04);

  color:var(--text);

  padding:14px 10px;

  font-size:.82rem;

  font-weight:800;

  backdrop-filter:blur(10px);

  cursor:pointer;

  transition:
    transform .12s ease,
    opacity .2s ease,
    background .2s ease;
}

.chip:active{
  transform:scale(.98);
}

.primary{

  width:100%;

  margin-top:18px;

  padding:18px;

  border:0;

  border-radius:999px;

  background:
    linear-gradient(
      135deg,
      #c69220 0%,
      #f3e28a 45%,
      #b88218 100%
    );

  color:#111;

  font-size:1rem;

  font-weight:900;

  letter-spacing:.02em;

  cursor:pointer;

  display:flex;

  align-items:center;

  justify-content:center;

  box-shadow:
    0 14px 28px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.25);

  transition:
    transform .15s ease,
    filter .2s ease;
}

.primary:hover{
  filter:brightness(1.03);
}

.primary:active{
  transform:scale(.99);
}

.helper{

  margin:14px 0 0;

  text-align:center;

  color:var(--muted);

  font-size:.82rem;

  line-height:1.6;
}

.loader-ring{

  width:18px;
  height:18px;

  border:2px solid rgba(0,0,0,.18);

  border-top:2px solid #111;

  border-radius:50%;

  display:inline-block;

  margin-right:10px;

  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

.result{

  margin-top:24px;
}

.result-card{

  opacity:0;

  transform:translateY(16px);

  border-radius:28px;

  margin-top:14px;

  padding:20px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.04),
      rgba(255,255,255,.015)
    );

  border:1px solid rgba(212,175,55,.14);

  box-shadow:
    0 18px 42px rgba(0,0,0,.42);

  backdrop-filter:blur(22px);

  animation:cardReveal .55s forwards;
}

.result-card:nth-child(1){
  animation-delay:.05s;
}

.result-card:nth-child(2){
  animation-delay:.12s;
}

.result-card:nth-child(3){
  animation-delay:.19s;
}

.result-card:nth-child(4){
  animation-delay:.26s;
}

.result-card:nth-child(5){
  animation-delay:.33s;
}

.result-card.featured{

  background:
    linear-gradient(
      180deg,
      rgba(212,175,55,.12),
      rgba(255,255,255,.02)
    );
}

.label{

  margin-bottom:10px;

  color:var(--gold-soft);

  font-size:.72rem;

  font-weight:900;

  letter-spacing:.13em;

  text-transform:uppercase;
}

.result-text{

  line-height:1.75;

  color:rgba(248,239,217,.92);

  font-size:.96rem;
}

.logic-line{

  margin-top:10px;

  padding:14px;

  border-radius:16px;

  background:rgba(0,0,0,.22);

  border:1px solid rgba(212,175,55,.10);

  line-height:1.7;

  font-size:.92rem;
}

.bottom-nav{

  position:fixed;

  left:50%;
  bottom:10px;

  transform:translateX(-50%);

  width:calc(100% - 28px);

  max-width:400px;

  height:68px;

  display:grid;

  grid-template-columns:repeat(4,1fr);

  gap:4px;

  padding:8px;

  border-radius:24px;

  background:rgba(10,10,12,.84);

  border:1px solid rgba(212,175,55,.16);

  backdrop-filter:blur(26px);

  box-shadow:
    0 18px 45px rgba(0,0,0,.72);
}

.bottom-nav button{

  border:0;

  background:transparent;

  color:rgba(248,239,217,.48);

  font-size:.74rem;

  font-weight:800;

  border-radius:14px;

  transition:
    transform .12s ease,
    opacity .2s ease,
    background .2s ease;
}

.bottom-nav button.active{

  color:var(--gold-soft);

  background:rgba(255,255,255,.03);
}

.bottom-nav button:active{
  transform:scale(.96);
}

@keyframes cardReveal{

  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<main class="app">

  <header class="topbar">

    <button class="icon-btn" type="button">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <line x1="4" y1="7" x2="20" y2="7"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="17" x2="20" y2="17"/>
      </svg>

    </button>

    <div class="brand">
      <h1>Dream Interpreter</h1>
      <p>Private dream journal</p>
    </div>

    <button class="icon-btn" type="button">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
      </svg>

    </button>

  </header>

  <section class="hero">

    <div class="kicker">
      Decode One Dream
    </div>

    <h2>
      What did you dream?
    </h2>

    <p>
      Write the dream clearly.
      Include the ending,
      emotions,
      people,
      places,
      and key symbols.
    </p>

  </section>

  <section class="input-card">

    <label for="email">
      Email
    </label>

    <input
      id="email"
      type="email"
      placeholder="you@example.com"
    />

    <label for="dream">
      Dream Entry
    </label>

    <textarea
      id="dream"
      placeholder="Example: I was being chased through my old school. I felt afraid. I kept running and finally escaped."
    ></textarea>

    <div class="chips">

      <button
        class="chip"
        type="button"
        id="templateBtn"
      >
        Use Template
      </button>

      <button
        class="chip"
        type="button"
        id="clearBtn"
      >
        Clear Dream
      </button>

    </div>

    <button
      id="interpret"
      class="primary"
    >
      Decode Dream
    </button>

    <p class="helper">
      Your first interpretations are free.
      Journal features can be expanded later.
    </p>

  </section>

  <div
    id="result"
    class="result"
  ></div>

</main>

<nav class="bottom-nav">

  <button class="active" type="button">
    Decode
  </button>

  <button type="button">
    Journal
  </button>

  <button type="button">
    Symbols
  </button>

  <button type="button">
    Account
  </button>

</nav>

<script>

const API =
  window.location.origin.includes("localhost")
    ? "http://127.0.0.1:5000"
    : "https://interpreter.jamaicantruestories.com";

function esc(s){

  return String(s || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function render(data){

  const result =
    document.getElementById("result");

  const interp =
    data.interpretation || {};

  const facts =
    data.doctrine_facts || {};

  const event =
    facts.event_context || {};

  const action =
    event.primary_action || {};

  const subject =
    event.primary_subject || "";

  const place =
    event.primary_place || {};

  const ending =
    event.primary_ending || {};

  const readable =
    data.narration?.readable_summary || "";

  result.innerHTML = `

    <div class="result-card featured">

      <div class="label">
        Readable Summary
      </div>

      <div class="result-text">
        ${esc(readable)}
      </div>

    </div>

    <div class="result-card">

      <div class="label">
        Dream Logic
      </div>

      <div class="logic-line">
        <b>Action:</b>
        ${esc(action.name || "")}
        ${action.meaning ? " — " + esc(action.meaning) : ""}
      </div>

      <div class="logic-line">
        <b>Subject:</b>
        ${esc(subject || facts.top_symbols?.join(", ") || "")}
      </div>

      <div class="logic-line">
        <b>Place:</b>
        ${esc(place.name || "")}
        ${place.meaning ? " — " + esc(place.meaning) : ""}
      </div>

      <div class="logic-line">
        <b>Ending:</b>
        ${esc(ending.name || "")}
        ${ending.meaning ? " — " + esc(ending.meaning) : ""}
      </div>

    </div>

    <div class="result-card">

      <div class="label">
        Spiritual Meaning
      </div>

      <div class="result-text">
        ${esc(interp.spiritual_meaning)}
      </div>

    </div>

    <div class="result-card">

      <div class="label">
        Physical Effects
      </div>

      <div class="result-text">
        ${esc(interp.effects_in_physical_realm)}
      </div>

    </div>

    <div class="result-card">

      <div class="label">
        What To Do
      </div>

      <div class="result-text">
        ${esc(interp.what_to_do)}
      </div>

    </div>
  `;

  result.scrollIntoView({
    behavior:"smooth",
    block:"start"
  });
}

document.getElementById("templateBtn").onclick = () => {

  document.getElementById("dream").value =
`Dream:
[What happened?]

Symbols:
-
-
-

Emotion:
[What did you feel?]

Ending:
[How did it end?]`;
};

document.getElementById("clearBtn").onclick = () => {

  document.getElementById("dream").value = "";

  document.getElementById("dream").focus();
};

document.getElementById("interpret").onclick = async () => {

  const dream =
    document.getElementById("dream")
    .value
    .trim();

  const email =
    document.getElementById("email")
    .value
    .trim();

  const btn =
    document.getElementById("interpret");

  if(!dream){

    alert("Enter your dream first.");

    return;
  }

  btn.disabled = true;

  btn.innerHTML = `
    <span class="loader-ring"></span>
    Analyzing Dream...
  `;

  try{

    const res = await fetch(API + "/interpret", {

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        text:dream,
        email:email
      })
    });

    const data =
      await res.json();

    render(data);

  }catch(e){

    document.getElementById("result").innerHTML = `

      <div class="result-card">

        <div class="label">
          Error
        </div>

        <div class="result-text">
          Something went wrong calling the interpreter API.
        </div>

      </div>
    `;
  }

  finally{

    btn.disabled = false;

    btn.textContent = "Decode Dream";
  }
};

</script>

</body>
</html>
