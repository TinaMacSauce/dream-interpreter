services:
  - type: web
    name: dream-interpreter-0015
    env: python
    plan: starter
    region: oregon
    autoDeploy: true

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --worker-class gthread --timeout 120 --keep-alive 5

    healthCheckPath: /health

    envVars:

      # ============================================================
      # Python / Runtime
      # ============================================================

      - key: PYTHON_VERSION
        value: 3.11.11

      - key: PYTHONUNBUFFERED
        value: "1"

      - key: WEB_CONCURRENCY
        value: "2"

      # ============================================================
      # Security
      # ============================================================

      - key: FLASK_SECRET_KEY
        generateValue: true

      - key: SESSION_COOKIE_SAMESITE
        value: None

      - key: SESSION_COOKIE_SECURE
        value: "true"

      # ============================================================
      # Frontend / Domain
      # ============================================================

      - key: RETURN_URL
        value: https://interpreter.jamaicantruestories.com/

      - key: FRONTEND_URL
        value: https://interpreter.jamaicantruestories.com/

      - key: UPGRADE_URL
        value: https://interpreter.jamaicantruestories.com/upgrade

      # ============================================================
      # CORS
      # ============================================================

      - key: ALLOWED_ORIGINS
        value: https://interpreter.jamaicantruestories.com,https://jamaicantruestories.com,https://www.jamaicantruestories.com,https://plqwhd-jm.myshopify.com

      # ============================================================
      # Google Sheets
      # ============================================================

      - key: SPREADSHEET_ID
        value: 1ToWPpJ_u-Z14eqL9U1oJppXX6f63h_eZcjUVglKr4Zk

      - key: WORKSHEET_NAME
        value: Sheet1

      - key: GOOGLE_SERVICE_ACCOUNT_FILE
        value: /etc/secrets/credentials.json

      # ============================================================
      # Doctrine Mode
      # ============================================================

      - key: DOCTRINE_MODE
        value: "1"

      - key: NARRATIVE_ENABLED
        value: "1"

      - key: NARRATIVE_MAX_SYMBOLS
        value: "3"

      - key: NARRATION_ENABLED
        value: "1"

      - key: NARRATION_MODE
        value: deterministic_event

      - key: NARRATION_MAX_SYMBOLS
        value: "3"

      - key: NARRATION_INCLUDE_PROMPT_PAYLOAD
        value: "1"

      # ============================================================
      # Optional AI Narration
      # ============================================================

      - key: AI_NARRATION_ENABLED
        value: "0"

      - key: AI_NARRATION_PROVIDER
        value: none

      - key: AI_NARRATION_STRICT_DOCTRINE
        value: "1"

      # ============================================================
      # Performance
      # ============================================================

      - key: CACHE_TTL_SECONDS
        value: "120"

      - key: DEBUG_MATCH
        value: "0"

      # ============================================================
      # Free Usage System
      # ============================================================

      - key: FREE_QUOTA
        value: "3"

      - key: SHADOW_WINDOW_HOURS
        value: "72"

      # ============================================================
      # Dream Pack
      # ============================================================

      - key: DREAM_PACK_USES
        value: "3"

      - key: DREAM_PACK_HOURS
        value: "72"

      # ============================================================
      # Flask Templates
      # ============================================================

      - key: TEMPLATE_INDEX
        value: index.html

      - key: TEMPLATE_UPGRADE
        value: upgrade.html

      # ============================================================
      # Scaling / Safety
      # ============================================================

      - key: MAX_DREAM_LENGTH
        value: "2500"

      - key: MIN_DREAM_LENGTH
        value: "5"

      - key: BASE_MATCH_TOP_K
        value: "3"

      - key: MAX_RULE_HITS_PER_LAYER
        value: "4"

      # ============================================================
      # Stripe
      # ============================================================

      # Set these securely in the Render dashboard:
      # STRIPE_SECRET_KEY
      # STRIPE_WEBHOOK_SECRET
      # PRICE_WEEKLY
      # PRICE_MONTHLY
      # PRICE_DREAM_PACK
      # ADMIN_KEY
