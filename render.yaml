# render.yaml
services:
  - type: web
    name: dream-interpreter-0015
    env: python
    plan: starter
    region: oregon
    autoDeploy: true
    healthCheckPath: /health

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120

    envVars:
      # --- Sheet ---
      - key: SPREADSHEET_ID
        value: 1ToWPpJ_u-Z14eqL9U1oJppXX6f63h_eZcjUVglKr4Zk
      - key: WORKSHEET_NAME
        value: Sheet1

      # --- CORS ---
      - key: ALLOWED_ORIGINS
        value: https://jamaicantruestories.com,https://www.jamaicantruestories.com,https://plqwhd-jm.myshopify.com

      # --- Optional cache tuning (your app.py uses SHEET_CACHE_TTL) ---
      - key: SHEET_CACHE_TTL
        value: "120"

      # --- Debug (optional) ---
      - key: DEBUG_MATCH
        value: "0"
      - key: NARRATIVE_ENABLED
        value: "1"
      - key: NARRATIVE_MAX_SYMBOLS
        value: "3"

      # --- Google credentials (use ONE of the two approaches below) ---

      # Option A (RECOMMENDED): store service account JSON in Render as an env var
      # Set this in the Render dashboard as a Secret value:
      # GOOGLE_SERVICE_ACCOUNT_JSON

      # Option B: if you are mounting a credentials.json file into the container:
      - key: GOOGLE_SERVICE_ACCOUNT_FILE
        value: /etc/secrets/credentials.json
