<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jamaican Dream Interpreter</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Inter, sans-serif;
  background:#050509;
  color:#f5e7c6;
}

.container {
  max-width:720px;
  margin:auto;
  padding:20px;
}

h1 {
  font-family:Cinzel, serif;
  text-align:center;
  color:#f3e28a;
}

textarea, input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #444;
  background:#000;
  color:#fff;
  margin-top:6px;
}

button {
  width:100%;
  padding:14px;
  margin-top:14px;
  border-radius:999px;
  border:none;
  font-weight:bold;
  background:linear-gradient(90deg,#d4af37,#f3e28a);
  cursor:pointer;
}

.card {
  background:#0b0a10;
  padding:14px;
  border-radius:12px;
  margin-top:12px;
  border:1px solid #333;
}

.label {
  font-size:0.75rem;
  color:#d4af37;
  margin-bottom:6px;
  text-transform:uppercase;
}

.logic-line {
  padding:8px;
  margin-bottom:6px;
  background:#111;
  border-radius:8px;
}

.summary {
  background:#151020;
}

</style>
</head>

<body>

<div class="container">

<h1>Dream Interpreter</h1>

<input id="email" placeholder="Enter your email" />
<textarea id="dream" placeholder="Write your dream here..."></textarea>

<button id="interpret">Interpret Dream</button>

<div id="result"></div>

</div>

<script>

const API = window.location.origin.includes("localhost")
  ? "http://127.0.0.1:5000"
  : "https://interpreter.jamaicantruestories.com";

function esc(s){
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function render(data){

  const result = document.getElementById("result");

  const interp = data.interpretation || {};
  const facts = data.doctrine_facts || {};
  const event = facts.event_context || {};

  const action = event.primary_action || {};
  const subject = event.primary_subject || "";
  const place = event.primary_place || {};
  const ending = event.primary_ending || {};

  const readable = data.narration?.readable_summary || "";

  result.innerHTML = `

  <div class="card">

    <div class="label">Dream Logic</div>

    <div class="logic-line"><b>1. Action:</b> ${esc(action.name || "")} ${action.meaning ? "— "+esc(action.meaning):""}</div>

    <div class="logic-line"><b>2. Subject:</b> ${esc(subject || facts.top_symbols?.join(", ") || "")}</div>

    <div class="logic-line"><b>3. Place:</b> ${esc(place.name || "")} ${place.meaning ? "— "+esc(place.meaning):""}</div>

    <div class="logic-line"><b>4. Ending:</b> ${esc(ending.name || "")} ${ending.meaning ? "— "+esc(ending.meaning):""}</div>

  </div>

  <div class="card summary">
    <div class="label">Readable Summary</div>
    <div>${esc(readable)}</div>
  </div>

  <div class="card">
    <div class="label">Spiritual Meaning</div>
    <div>${esc(interp.spiritual_meaning)}</div>
  </div>

  <div class="card">
    <div class="label">Effects</div>
    <div>${esc(interp.effects_in_physical_realm)}</div>
  </div>

  <div class="card">
    <div class="label">What To Do</div>
    <div>${esc(interp.what_to_do)}</div>
  </div>

  `;
}

document.getElementById("interpret").onclick = async () => {

  const dream = document.getElementById("dream").value.trim();
  const email = document.getElementById("email").value.trim();

  if(!dream){
    alert("Enter your dream");
    return;
  }

  const res = await fetch(API + "/interpret", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      text:dream,
      email:email
    })
  });

  const data = await res.json();
  render(data);
};

</script>

</body>
</html>
